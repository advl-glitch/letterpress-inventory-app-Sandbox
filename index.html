<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Prints by Angel — Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
    <link rel="stylesheet" href="style.css?v=20260315b">

    <!-- Favicon & Home Screen Icon -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <img src="doggycutetonguev2.png" class="splash-dog" alt="CardStock" onerror="this.style.display='none'">
            <div class="splash-text">
                <div class="splash-title">CardStock</div>
                <div class="splash-subtitle">Inventory App</div>
                <div class="splash-tagline">For Printmakers, by Printmakers</div>
            </div>
        </div>
    </div>

    <!-- Mobile Header -->
    <header class="mobile-header">
        <button class="hamburger" id="hamburger-btn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <div class="mobile-logo">
            <span class="logo-icon">✦</span>
            <span>Prints by Angel</span>
        </div>
        <div class="mobile-header-right"></div>
    </header>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-mark">✦</div>
                <div class="logo-text">
                    <span class="logo-title">Prints by Angel</span>
                    <span class="logo-sub">Inventory & Tracking</span>
                </div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Main</div>
            <button class="nav-item active" data-page="home">
                <span class="nav-icon">⌂</span>
                <span class="nav-label">Dashboard</span>
            </button>
            <button class="nav-item" data-page="master-items">
                <span class="nav-icon">◫</span>
                <span class="nav-label">Main Inventory List</span>
            </button>

            <div class="nav-section-label">Inventory</div>
            <button class="nav-item" data-page="new-item-design">
                <span class="nav-icon">✚</span>
                <span class="nav-label">Add New Design</span>
            </button>
            <button class="nav-item" data-page="print-stock-updater">
                <span class="nav-icon">⟳</span>
                <span class="nav-label">Print Stock Update</span>
            </button>
            <button class="nav-item" data-page="inventory-auditor">
                <span class="nav-icon">✓</span>
                <span class="nav-label">Inventory Audit</span>
            </button>

            <div class="nav-section-label">Retail</div>
            <button class="nav-item" data-page="record-sale">
                <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="18" height="18"><rect x="10" y="30" width="44" height="26" rx="2" fill="#f5e6a3"/><rect x="10" y="30" width="44" height="26" rx="2" fill="none" stroke="#2d2d2d" stroke-width="2.5"/><rect x="24" y="38" width="12" height="18" rx="1.5" fill="#f5e6a3" stroke="#2d2d2d" stroke-width="2"/><path d="M36 47 a1.2 1.2 0 1 1 0 0.1" fill="#2d2d2d"/><rect x="40" y="38" width="9" height="8" rx="1" fill="#f5e6a3" stroke="#2d2d2d" stroke-width="1.5"/><path d="M7 30 L32 20 L57 30" fill="#6b88b0" stroke="#2d2d2d" stroke-width="2.5" stroke-linejoin="round"/><line x1="14" y1="28" x2="14" y2="22" stroke="white" stroke-width="3.5" opacity="0.5"/><line x1="22" y1="25.5" x2="22" y2="20.5" stroke="white" stroke-width="3.5" opacity="0.5"/><line x1="42" y1="25.5" x2="42" y2="20.5" stroke="white" stroke-width="3.5" opacity="0.5"/><line x1="50" y1="28" x2="50" y2="22" stroke="white" stroke-width="3.5" opacity="0.5"/><path d="M7 30 Q10.5 34 14 30 Q17.5 34 21 30 Q24.5 34 28 30 Q31.5 34 35 30 Q38.5 34 42 30 Q45.5 34 49 30 Q52.5 34 57 30" fill="none" stroke="#2d2d2d" stroke-width="2"/><rect x="22" y="12" width="20" height="9" rx="2" fill="white" stroke="#2d2d2d" stroke-width="2"/></svg></span>
                <span class="nav-label">Retail Stock & Sales</span>
            </button>
            <button class="nav-item" data-page="retail-partners">
                <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="18" height="18"><rect x="10" y="30" width="44" height="26" rx="2" fill="#e8e0d8"/><rect x="10" y="30" width="44" height="26" rx="2" fill="none" stroke="#5a3a28" stroke-width="2.5"/><rect x="22" y="38" width="12" height="18" rx="1.5" fill="#e8e0d8" stroke="#5a3a28" stroke-width="2"/><path d="M34 47 a1.2 1.2 0 1 1 0 0.1" fill="#5a3a28"/><rect x="40" y="38" width="10" height="10" rx="1" fill="#b8dce8" stroke="#5a3a28" stroke-width="1.5"/><path d="M7 30 L32 20 L57 30" fill="#e05050" stroke="#5a3a28" stroke-width="2.5" stroke-linejoin="round"/><line x1="14" y1="28" x2="14" y2="22" stroke="white" stroke-width="3.5" opacity="0.6"/><line x1="22" y1="25.5" x2="22" y2="20.5" stroke="white" stroke-width="3.5" opacity="0.6"/><line x1="42" y1="25.5" x2="42" y2="20.5" stroke="white" stroke-width="3.5" opacity="0.6"/><line x1="50" y1="28" x2="50" y2="22" stroke="white" stroke-width="3.5" opacity="0.6"/><path d="M7 30 Q10.5 34 14 30 Q17.5 34 21 30 Q24.5 34 28 30 Q31.5 34 35 30 Q38.5 34 42 30 Q45.5 34 49 30 Q52.5 34 57 30" fill="none" stroke="#5a3a28" stroke-width="2"/><rect x="10" y="8" width="44" height="13" rx="2" fill="white" stroke="#5a3a28" stroke-width="2"/></svg></span>
                <span class="nav-label">Retail Partners</span>
            </button>
            <button class="nav-item" data-page="vending-machines">
                <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="18" height="18"><rect x="12" y="6" width="40" height="52" rx="3" fill="#e03030" stroke="#2d2d2d" stroke-width="2"/><rect x="16" y="10" width="24" height="34" rx="2" fill="#f5f0e8"/><rect x="16" y="10" width="24" height="34" rx="2" fill="none" stroke="#2d2d2d" stroke-width="1.5"/><line x1="16" y1="21" x2="40" y2="21" stroke="#ddd" stroke-width="1"/><line x1="16" y1="32" x2="40" y2="32" stroke="#ddd" stroke-width="1"/><circle cx="21" cy="16" r="2.5" fill="#5bc0de"/><circle cx="28" cy="16" r="2.5" fill="#5bc0de"/><circle cx="35" cy="16" r="2.5" fill="#f0c040"/><circle cx="21" cy="27" r="2.5" fill="#e05050"/><circle cx="28" cy="27" r="2.5" fill="#50b080"/><circle cx="35" cy="27" r="2.5" fill="#e05050"/><circle cx="21" cy="38" r="2.5" fill="#f0c040"/><circle cx="28" cy="38" r="2.5" fill="#5bc0de"/><circle cx="35" cy="38" r="2.5" fill="#50b080"/><rect x="42" y="12" width="7" height="16" rx="1.5" fill="#1a1a1a"/><rect x="16" y="48" width="24" height="6" rx="1" fill="#b02020"/><rect x="16" y="48" width="24" height="6" rx="1" fill="none" stroke="#2d2d2d" stroke-width="1"/></svg></span>
                <span class="nav-label">Vending Machines</span>
            </button>
            <button class="nav-item" data-page="orders">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Orders & Requests</span>
            </button>
            <button class="nav-item" data-page="market-sales">
                <span class="nav-icon">🎪</span>
                <span class="nav-label">Market Sales</span>
            </button>

            <div class="nav-section-label">Reports</div>
            <button class="nav-item" data-page="sales-reports">
                <span class="nav-icon">◎</span>
                <span class="nav-label">Sales Reports</span>
            </button>

            <div class="nav-section-label">System</div>
            <button class="nav-item" data-page="settings">
                <span class="nav-icon">⚙</span>
                <span class="nav-label">Settings</span>
            </button>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-text">PrintsByAngel © 2026</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="app-container">
        <!-- Pages render here -->
    </main>

    <!-- Detail Panel (slide-out) -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-panel-inner">
            <button class="detail-close" id="detail-close">✕</button>
            <div class="detail-panel-content" id="detail-panel-content"></div>
        </div>
    </div>
    <div class="detail-overlay" id="detail-overlay"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modal-close">✕</button>
            <div class="modal-content" id="modal-content"></div>
        </div>
    </div>

    <!-- Sub-modal (stacks on top of main modal) -->
    <div class="modal-overlay" id="sub-modal-overlay" style="z-index:1100;display:none;">
        <div class="modal" id="sub-modal">
            <button class="modal-close" id="sub-modal-close">✕</button>
            <div class="modal-content" id="sub-modal-content"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Hidden record-sale template -->
    <div id="record-sale-page" style="display:none;">
        <div class="card" style="margin-bottom:1.5rem;">
            <div class="form-field">
                <label class="field-label">Select a Retail Partner</label>
                <select id="retail-partner-select"></select>
            </div>
        </div>
        <div id="retail-partner-info" style="display:none;">
            <div class="partner-info-header">
                <div>
                    <h2 id="retail-partner-name" class="partner-name"></h2>
                    <p class="partner-last-visit">Last Inventory: <span id="last-visit-date"></span></p>
                </div>
                <button class="btn btn-secondary" id="sales-report-btn">📄 Generate Report</button>
            </div>
            <h3 class="section-title">Inventory on Hand</h3>
            <div id="inventory-list-container"></div>
            <template id="inventory-item-template">
                <div class="inventory-card">
                    <div class="inventory-card-header">
                        <h4 class="design-name"></h4>
                        <span class="stock-badge"><span class="current-stock">0</span> on shelf</span>
                    </div>
                    <div class="inventory-actions">
                        <div class="action-field">
                            <label>Update Stock</label>
                            <input type="number" class="update-stock-input action-input" placeholder="New total" min="0">
                        </div>
                        <div class="action-field">
                            <label>Add Cards</label>
                            <input type="number" class="add-stock-input action-input" placeholder="+ qty" min="0">
                        </div>
                        <div class="action-field">
                            <label>Pull Cards</label>
                            <input type="number" class="pull-stock-input action-input" placeholder="- qty" min="0">
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="cardstock-app.js?v=20260326"></script>
</body>
</html>
